<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lensly X — Booking Requests</title>
<link rel="stylesheet" href="css/style.css">
<style>

.brand-row { display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
.brand-mark { display:flex; align-items:baseline; gap:4px; font-family:var(--serif); font-size:15px; letter-spacing:1px; }
.brand-mark .lensly { color:var(--muted); font-weight:300; }
.brand-mark .x { color:var(--accent); font-weight:600; font-size:17px; border:1px solid var(--accent); border-radius:4px; padding:0px 6px; line-height:1.5; margin-left:2px; }
.brand-sub { font-size:8px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:1px; }
.header-icons { display:flex; gap:8px; align-items:center; }
.header-icon-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; cursor:pointer; transition:border-color .2s; position:relative; }
.header-icon-btn:hover { border-color:var(--accent); }
.header-icon-btn .dot { position:absolute; top:6px; right:7px; width:7px; height:7px; background:var(--accent); border-radius:50%; border:1.5px solid var(--bg); }

/* ── Loading / error state ── */
.state-box { text-align:center; padding:40px 20px; color:var(--muted); font-size:12px; }
.state-box .si { font-size:32px; opacity:.4; margin-bottom:8px; }
.spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Stat strip ── */
.stat-strip { display:grid; grid-template-columns:1fr 1fr 1fr; gap:0; border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; margin-top:14px; }
.stat-cell { padding:11px 6px; text-align:center; border-right:1px solid var(--border); }
.stat-cell:last-child { border-right:none; }
.stat-cell .sv { font-family:var(--serif); font-size:20px; color:var(--accent); }
.stat-cell .sl { font-size:8.5px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:2px; }

/* ── Tabs ── */
.tab-row { display:flex; gap:0; margin-top:14px; border:1px solid var(--border); border-radius:var(--r-sm); overflow:hidden; }
.tab-btn { flex:1; padding:9px 4px; text-align:center; font-size:10px; letter-spacing:.5px; color:var(--muted); cursor:pointer; border-right:1px solid var(--border); transition:all .15s; background:var(--surface); }
.tab-btn:last-child { border-right:none; }
.tab-btn.active { background:var(--surface2); color:var(--accent); }
.tab-count { display:inline-block; background:var(--border); border-radius:99px; font-size:8px; padding:1px 5px; margin-left:4px; }
.tab-btn.active .tab-count { background:var(--accent); color:#0d0d0d; }

/* ── Group label ── */
.day-group-label { font-size:9px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin:18px 0 8px; }

/* ── Request card ── */
.req-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md); overflow:hidden; transition:all .25s; }
.req-card + .req-card { margin-top:10px; }
.req-card.is-new { border-color:#3a2e18; }
.req-card.removing { opacity:0; transform:translateX(30px); }

.req-top { display:flex; align-items:flex-start; gap:11px; padding:13px 14px 10px; }
.req-avatar { width:42px; height:42px; border-radius:50%; background:var(--surface2); border:1px solid var(--border-hi); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.req-info { flex:1; min-width:0; }
.req-client { font-family:var(--serif); font-size:15px; line-height:1.2; }
.req-meta { font-size:9.5px; color:var(--muted); margin-top:2px; }
.req-status-pill { font-size:8px; letter-spacing:1px; text-transform:uppercase; padding:3px 8px; border-radius:99px; flex-shrink:0; white-space:nowrap; }
.pill-new       { background:#2a1e08; color:var(--accent);   border:1px solid #3a2e18; }
.pill-accepted  { background:#0f2a18; color:var(--success);  border:1px solid #1e4030; }
.pill-completed { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.pill-rejected  { background:#1e1010; color:#8a4a3a; border:1px solid #3a2020; }

.req-body { padding:0 14px 12px; display:flex; flex-direction:column; gap:7px; }
.req-detail-row { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text); }
.req-detail-row .ic { font-size:13px; width:18px; text-align:center; flex-shrink:0; }
.req-detail-row .muted { color:var(--muted); }
.req-price { font-family:var(--serif); font-size:18px; color:var(--accent); margin-left:auto; flex-shrink:0; }

/* ── Action row ── */
.req-actions { display:flex; gap:8px; padding:0 14px 14px; }
.act-btn { flex:1; padding:11px; border-radius:var(--r-sm); font-family:var(--mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:all .2s; border:none; text-align:center; }
.act-accept  { background:var(--accent); color:#0d0d0d; }
.act-accept:hover { background:var(--accent2); }
.act-decline { background:transparent; border:1px solid var(--border-hi); color:var(--muted); }
.act-decline:hover { border-color:var(--danger); color:var(--danger); }
.req-actions.secondary .act-btn { background:transparent; border:1px solid var(--border); color:var(--text); }
.req-actions.secondary .act-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── Saving indicator ── */
.saving-badge { font-size:9px; color:var(--muted); letter-spacing:.5px; padding:4px 8px; text-align:center; }

/* ── Empty state ── */
.empty-state { text-align:center; padding:50px 20px; color:var(--muted); }
.empty-state .es-icon { font-size:32px; opacity:.3; margin-bottom:8px; }
.empty-state .es-text { font-size:12px; line-height:1.7; }

/* ── Toast ── */
.toast { position:fixed; top:60px; left:50%; transform:translateX(-50%) translateY(-20px); border-radius:var(--r-sm); padding:10px 18px; font-size:11px; letter-spacing:.5px; white-space:nowrap; opacity:0; pointer-events:none; transition:all .3s; z-index:200; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.success { background:var(--success); color:white; }
.toast.error   { background:var(--danger); color:white; }
.toast.decline { background:#663c2a; color:#f0c8b0; }

</style>
</head>
<body>
<div class="shell"><div class="phone">

  <div class="status-bar">
    <span class="time" id="clockTime">9:30</span>
    <div class="status-icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>

  <!-- Brand -->
  <div class="brand-row fade-up" style="padding-top:4px">
    <div>
      <div class="brand-mark"><span class="lensly">LENSLY</span><span class="x">X</span></div>
      <div class="brand-sub">For Freelance Professionals</div>
    </div>
    <div class="header-icons">
      <div class="header-icon-btn" id="bellBtn">🔔<div class="dot" id="notifDot"></div></div>
      <a href="lensly-x-profile.html" style="font-size:9px;color:var(--muted);letter-spacing:1px;text-decoration:none;text-transform:uppercase">Profile</a>
    </div>
  </div>

  <!-- Header -->
  <div style="padding:10px 20px 0" class="fade-up-2">
    <h1 class="heading" style="margin-top:2px">Booking Requests</h1>
  </div>

  <div class="content">

    <!-- Stat strip (populated by JS) -->
    <div class="stat-strip fade-up-2">
      <div class="stat-cell"><div class="sv" id="statPending">—</div><div class="sl">Pending</div></div>
      <div class="stat-cell"><div class="sv" id="statAccepted">—</div><div class="sl">Accepted</div></div>
      <div class="stat-cell"><div class="sv" id="statTotal">—</div><div class="sl">Total</div></div>
    </div>

    <!-- Tabs -->
    <div class="tab-row fade-up-2">
      <div class="tab-btn active" data-tab="Pending"   onclick="switchTab(this)">Pending   <span class="tab-count" id="tc-Pending">0</span></div>
      <div class="tab-btn"        data-tab="Accepted"  onclick="switchTab(this)">Accepted  <span class="tab-count" id="tc-Accepted">0</span></div>
      <div class="tab-btn"        data-tab="all"       onclick="switchTab(this)">All</div>
    </div>

    <!-- Request list (populated by JS) -->
    <div id="bookingList" class="fade-up-3">
      <div class="state-box">
        <div class="spinner"></div>
        <div>Loading from Excel…</div>
      </div>
    </div>

    <div style="height:24px"></div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="lensly-x-feed.html"    class="nav-item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Feed</a>
    <a href="lensly-x-learning.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>Learning</a>
    <a href="lensly-x-profile.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>Profile</a>
    <a href="lensly-x-shop.html"    class="nav-item"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Shop</a>
  </nav>

</div></div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const API = 'http://localhost:3000/api';
// Change this to the photographer's ID you want to show requests for
const MY_PHOTOGRAPHER_ID = 'PHT-001';

let allBookings    = [];
let currentTab     = 'Pending';

/* ══════════════════════════════════════════════════════════
   LIVE CLOCK
══════════════════════════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  const h   = String(now.getHours()).padStart(2,'0');
  const m   = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${h}:${m}`;
}
updateClock();
setInterval(updateClock, 30000);

/* ══════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ══════════════════════════════════════════════════════════
   FORMAT HELPERS
══════════════════════════════════════════════════════════ */
function fmtINR(n) {
  return '₹' + Number(n).toLocaleString('en-IN');
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const days  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months= ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (diff < 1)   return 'Just now';
  if (diff < 60)  return diff + ' min ago';
  if (diff < 1440)return Math.floor(diff/60) + ' hr ago';
  return Math.floor(diff/1440) + ' day' + (Math.floor(diff/1440)>1?'s':'') + ' ago';
}

function fmtTime(t24) {
  if (!t24) return '';
  const [hh, mm] = t24.split(':').map(Number);
  const ap = hh >= 12 ? 'PM' : 'AM';
  const h  = hh > 12 ? hh - 12 : hh || 12;
  return `${h}:${String(mm).padStart(2,'0')} ${ap}`;
}

function pkgIcon(pkg) {
  return pkg === 'Full Day' ? '☀️' : '🌤';
}

function pillClass(status) {
  const map = { Pending:'pill-new', Accepted:'pill-accepted', Rejected:'pill-rejected', Completed:'pill-completed' };
  return map[status] || 'pill-new';
}

/* ══════════════════════════════════════════════════════════
   LOAD BOOKINGS FROM EXCEL VIA API
══════════════════════════════════════════════════════════ */
async function loadBookings() {
  try {
    const res  = await fetch(`${API}/bookings?photographer_id=${MY_PHOTOGRAPHER_ID}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error);
    allBookings = json.data;
    renderAll();
  } catch (err) {
    document.getElementById('bookingList').innerHTML = `
      <div class="state-box">
        <div class="si">⚠️</div>
        <div>Cannot reach backend.<br>Make sure the server is running on port 3000.</div>
        <div style="margin-top:10px;font-size:9px;color:var(--muted)">
          Run: <code style="background:var(--surface);padding:2px 6px;border-radius:3px">node server.js</code>
        </div>
        <button onclick="loadBookings()" style="margin-top:12px;background:var(--accent);color:#0d0d0d;border:none;padding:8px 18px;border-radius:var(--r-sm);font-family:var(--mono);font-size:10px;letter-spacing:1px;cursor:pointer">Retry</button>
      </div>`;
    console.error('API error:', err.message);
  }
}

/* ══════════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════════ */
function renderAll() {
  updateStats();
  renderList();
}

function updateStats() {
  const pending  = allBookings.filter(b => b.status === 'Pending').length;
  const accepted = allBookings.filter(b => b.status === 'Accepted').length;

  document.getElementById('statPending').textContent  = pending;
  document.getElementById('statAccepted').textContent = accepted;
  document.getElementById('statTotal').textContent    = allBookings.length;

  document.getElementById('tc-Pending').textContent  = pending;
  document.getElementById('tc-Accepted').textContent = accepted;

  // Show/hide notification dot
  document.getElementById('notifDot').style.display = pending > 0 ? '' : 'none';
}

function renderList() {
  const list = document.getElementById('bookingList');

  // Filter based on current tab
  let rows = allBookings;
  if (currentTab !== 'all') rows = rows.filter(b => b.status === currentTab);

  if (rows.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">📭</div>
        <div class="es-text">No ${currentTab === 'all' ? '' : currentTab.toLowerCase() + ' '}requests right now.<br>New bookings appear here automatically.</div>
      </div>`;
    return;
  }

  // Group: Pending/today first, then rest
  let html = '';
  const today = new Date().toISOString().split('T')[0];

  const isRecent = b => b.shoot_date >= today;
  const recent   = rows.filter(isRecent);
  const earlier  = rows.filter(b => !isRecent(b));

  if (recent.length)  html += `<div class="day-group-label">Upcoming</div>${recent.map(cardHTML).join('')}`;
  if (earlier.length) html += `<div class="day-group-label" style="margin-top:18px">Earlier</div>${earlier.map(cardHTML).join('')}`;

  list.innerHTML = html;
}

function cardHTML(b) {
  const isPending = b.status === 'Pending';
  const isNew     = b.status === 'Pending';

  const actions = isPending ? `
    <div class="req-actions">
      <button class="act-btn act-decline" onclick="doReject('${b.id}', this)">Decline</button>
      <button class="act-btn act-accept"  onclick="doAccept('${b.id}', this)">Accept Booking</button>
    </div>` : `
    <div class="req-actions secondary">
      <button class="act-btn">💬 Message</button>
      <button class="act-btn">📍 Directions</button>
    </div>`;

  return `
    <div class="req-card ${isNew ? 'is-new' : ''}" data-id="${b.id}" data-status="${b.status}">
      <div class="req-top">
        <div class="req-avatar">${b.avatar_emoji || '👤'}</div>
        <div class="req-info">
          <div class="req-client">${b.client_name}</div>
          <div class="req-meta">${timeAgo(b.requested_on)} · Ref: ${b.booking_ref}</div>
        </div>
        <span class="req-status-pill ${pillClass(b.status)}">${b.status}</span>
      </div>
      <div class="req-body">
        <div class="req-detail-row"><span class="ic">📅</span><span>${fmtDate(b.shoot_date)} · ${fmtTime(b.start_time)}</span></div>
        <div class="req-detail-row"><span class="ic">${pkgIcon(b.package)}</span><span>${b.package} <span class="muted">(${b.package === 'Full Day' ? '12 hrs' : '6 hrs'})</span></span><span class="req-price">${fmtINR(b.total)}</span></div>
        <div class="req-detail-row"><span class="ic">📍</span><span class="muted">${b.location}, ${b.city}</span></div>
        <div class="req-detail-row"><span class="ic">🎯</span><span class="muted">${b.purpose}</span></div>
        ${b.notes ? `<div class="req-detail-row"><span class="ic">📝</span><span class="muted" style="font-style:italic">"${b.notes}"</span></div>` : ''}
      </div>
      ${actions}
    </div>`;
}

/* ══════════════════════════════════════════════════════════
   ACCEPT / REJECT — writes back to Excel via API
══════════════════════════════════════════════════════════ */
async function doAccept(id, btn) {
  const card = document.querySelector(`[data-id="${id}"]`);
  // Disable buttons immediately
  card.querySelectorAll('.act-btn').forEach(b => b.disabled = true);
  card.querySelector('.act-accept').textContent = 'Saving…';

  try {
    const res  = await fetch(`${API}/bookings/${id}/accept`, { method: 'PATCH' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    // Update local data
    const idx = allBookings.findIndex(b => b.id === id);
    if (idx > -1) allBookings[idx].status = 'Accepted';

    renderAll();
    showToast('✓ Booking accepted — saved to Excel', 'success');
  } catch (err) {
    showToast('⚠ Error: ' + err.message, 'error');
    card.querySelectorAll('.act-btn').forEach(b => b.disabled = false);
    card.querySelector('.act-accept').textContent = 'Accept Booking';
  }
}

async function doReject(id, btn) {
  if (!confirm('Decline this booking request? The client will be notified.')) return;

  const card = document.querySelector(`[data-id="${id}"]`);
  card.querySelectorAll('.act-btn').forEach(b => b.disabled = true);

  try {
    const res  = await fetch(`${API}/bookings/${id}/reject`, { method: 'PATCH' });
    const json = await res.json();
    if (!json.success) throw new Error(json.error);

    // Animate out
    card.classList.add('removing');
    setTimeout(() => {
      const idx = allBookings.findIndex(b => b.id === id);
      if (idx > -1) allBookings[idx].status = 'Rejected';
      renderAll();
    }, 260);

    showToast('Booking declined — saved to Excel', 'decline');
  } catch (err) {
    showToast('⚠ Error: ' + err.message, 'error');
    card.querySelectorAll('.act-btn').forEach(b => b.disabled = false);
  }
}

/* ══════════════════════════════════════════════════════════
   TABS
══════════════════════════════════════════════════════════ */
function switchTab(el) {
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = el.dataset.tab;
  renderList();
}

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
loadBookings();

// Auto-refresh every 30 seconds (polls for new requests)
setInterval(() => {
  if (document.visibilityState === 'visible') loadBookings();
}, 30000);
</script>
</body>
</html>
