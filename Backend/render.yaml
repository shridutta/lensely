# Render deployment blueprint for the Lensly backend.
# Deploys from the monorepo: the backend lives in the Backend/ subfolder,
# so `rootDir: Backend` scopes the build/start to it.
# Render → New → Blueprint, point it at the repo (shridutta/lensely).
# Set the secret env vars in the Render dashboard (marked sync:false).
services:
  - type: web
    name: lensly-api
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false          # set to your Cloudflare Pages domain
